# ============================================
# Maternal & Child Health Tracker - Config
# ============================================

# Server
server.port=8090

# ---- MySQL Database Config ----
# IMPORTANT: Change password to match your MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/mch_tracker?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- Hibernate / JPA Config ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- JSP View Resolver ----
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# ---- Scheduled Tasks ----
spring.task.scheduling.pool.size=5
